apiVersion: v1
kind: ConfigMap
metadata:
  name: db-init
  namespace: {{ include "app.namespace" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS items (
        id SERIAL PRIMARY KEY,
        name VARCHAR(255) NOT NULL,
        description TEXT DEFAULT '',
        created_at TIMESTAMP DEFAULT NOW()
    );

    INSERT INTO items (name, description) VALUES
        ('Sample Item 1', 'This is a demo item created on init'),
        ('Sample Item 2', 'Another demo item for testing'),
        ('Sample Item 3', 'Third item to show the list works');
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-data
  namespace: {{ include "app.namespace" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.db.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: {{ include "app.namespace" . }}
  labels:
    app: db
    {{- include "app.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
        - name: postgres
          image: {{ .Values.db.image }}
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: db-credentials
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - {{ .Values.db.user }}
                - -d
                - {{ .Values.db.name }}
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: db-data
        - name: init
          configMap:
            name: db-init
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: {{ include "app.namespace" . }}
  labels:
    app: db
    {{- include "app.labels" . | nindent 4 }}
spec:
  selector:
    app: db
  ports:
    - port: 5432
      targetPort: 5432
