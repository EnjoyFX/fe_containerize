server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;


    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://cloudflareinsights.com; font-src 'self'; frame-ancestors 'self';" always;

    # Prevent http downgrade in redirects (nginx listens on 80 behind proxy)
    absolute_redirect off;

    # Limit request body size
    client_max_body_size 1m;

    # robots.txt — serve as plain text, bypass SPA fallback
    location = /robots.txt {
        add_header Content-Type text/plain always;
        try_files /robots.txt =404;
    }

    # Serve frontend static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Clean response for /api and /api/ base paths
    location = /api {
        default_type application/json;
        return 200 '{"endpoints":["/api/health","/api/items"]}';
    }
    location = /api/ {
        default_type application/json;
        return 200 '{"endpoints":["/api/health","/api/items"]}';
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # No caching for API responses
        add_header Cache-Control "no-store" always;
    }

    # Proxy micro-frontend assets (no cache — bundle changes on redeploy)
    location /mfe/ {
        proxy_pass http://microfrontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
    }
}
